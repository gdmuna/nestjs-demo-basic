name: Generate Release Snapshot

on:
  push:
    branches: ['release-[0-9]*']

concurrency:
  group: release-snapshot-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

env:
  DOCKER_USERNAME: ${{ vars.DOCKER_USERNAME || github.repository_owner }}
  DOCKER_REPO_NAME: ${{ vars.DOCKER_REPO_NAME || github.event.repository.name }}
  DATABASE_URL: ${{ secrets.PROD_DB_URL }}
  BACKEND_CONTAINER_PORT: ${{ vars.PROD_BACKEND_CONTAINER_PORT || 3000 }}
  BACKEND_HOST_PORT: ${{ vars.PROD_BACKEND_HOST_PORT || 3001 }}

jobs:
  extract-build-info:
    name: Extract build info
    if: "contains(github.event.head_commit.message, '[snapshot]')"
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.build-info.outputs.version }}
      sha7: ${{ steps.build-info.outputs.sha7 }}
      timestamp: ${{ steps.build-info.outputs.timestamp }}
      snapshot_tag: ${{ steps.build-info.outputs.snapshot_tag }}
      docker_image_snapshot_tag: ${{ steps.build-info.outputs.docker_image_snapshot_tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Generate snapshot info
        id: build-info
        run: node scripts/generate-snapshot-info.cjs

  check-snapshot-tag:
    name: Check snapshot tag
    needs: extract-build-info
    if: "contains(github.event.head_commit.message, '[snapshot]')"
    runs-on: ubuntu-latest
    outputs:
      tag_exists: ${{ steps.check.outputs.exists }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Check if tag exists
        id: check
        run: |
          git fetch --tags
          if git rev-parse "${{ needs.extract-build-info.outputs.snapshot_tag }}" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

  push-snapshot-tag:
    name: Push snapshot tag
    needs: [extract-build-info, check-snapshot-tag]
    if: "contains(github.event.head_commit.message, '[snapshot]') && needs.check-snapshot-tag.outputs.tag_exists == 'false'"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Push Git tag
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          if git tag "${{ needs.extract-build-info.outputs.snapshot_tag }}" ${{ github.sha }}; then
            git push origin "${{ needs.extract-build-info.outputs.snapshot_tag }}" || {
              echo "Failed to push tag"
              exit 1
            }
          else
            echo "Failed to create tag"
            exit 1
          fi

  build-and-publish:
    name: Build and publish Docker image
    needs: extract-build-info
    if: "contains(github.event.head_commit.message, '[snapshot]')"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.DOCKER_USERNAME }}/${{ env.DOCKER_REPO_NAME }}:${{ needs.extract-build-info.outputs.docker_image_snapshot_tag }}
          build-args: |
            GIT_COMMIT=${{ github.sha }}
            APP_VERSION=${{ needs.extract-build-info.outputs.version }}
            NODE_ENV=production
            PORT=${{ env.BACKEND_CONTAINER_PORT }}

  finished:
    name: Finished
    needs:
      - extract-build-info
      - check-snapshot-tag
      - push-snapshot-tag
      - build-and-publish
    if: "always() && contains(github.event.head_commit.message, '[snapshot]')"
    runs-on: ubuntu-latest
    env:
      COMMIT_MESSAGE: ${{ github.event.head_commit.message }}

    steps:
      - name: Generate summary
        run: |
          TIMESTAMP_UTC=$(date -u +"%Y-%m-%d %H:%M:%S UTC")
          TIMESTAMP_CN=$(TZ='Asia/Shanghai' date +"%Y-%m-%d %H:%M:%S %Z")

          # 获取 job 状态
          EXTRACT_BUILD_INFO_STATUS="${{ needs.extract-build-info.result }}"
          CHECK_SNAPSHOT_TAG_STATUS="${{ needs.check-snapshot-tag.result }}"
          PUSH_SNAPSHOT_TAG_STATUS="${{ needs.push-snapshot-tag.result }}"
          BUILD_PUBLISH_STATUS="${{ needs.build-and-publish.result }}"

          # 状态图标映射
          case "$EXTRACT_BUILD_INFO_STATUS" in
            success) EXTRACT_ICON="✅" ;;
            failure) EXTRACT_ICON="❌" ;;
            cancelled) EXTRACT_ICON="🚫" ;;
            skipped) EXTRACT_ICON="⏭️" ;;
            *) EXTRACT_ICON="❓" ;;
          esac

          case "$CHECK_SNAPSHOT_TAG_STATUS" in
            success) CHECK_ICON="✅" ;;
            failure) CHECK_ICON="❌" ;;
            cancelled) CHECK_ICON="🚫" ;;
            skipped) CHECK_ICON="⏭️" ;;
            *) CHECK_ICON="❓" ;;
          esac

          case "$PUSH_SNAPSHOT_TAG_STATUS" in
            success) PUSH_ICON="✅" ;;
            failure) PUSH_ICON="❌" ;;
            cancelled) PUSH_ICON="🚫" ;;
            skipped) PUSH_ICON="⏭️" ;;
            *) PUSH_ICON="❓" ;;
          esac

          case "$BUILD_PUBLISH_STATUS" in
            success) BUILD_ICON="✅" ;;
            failure) BUILD_ICON="❌" ;;
            cancelled) BUILD_ICON="🚫" ;;
            skipped) BUILD_ICON="⏭️" ;;
            *) BUILD_ICON="❓" ;;
          esac

          # 生成统一的 summary
          cat >> $GITHUB_STEP_SUMMARY << EOF
          # 🔬 Release Snapshot 流程报告
          ## 📋 基本信息
          - **触发事件**: push
          - **代码仓库**: [${{ github.repository }}](${{ github.server_url }}/${{ github.repository }})
          - **所属分支**: [${{ github.ref_name }}](${{ github.server_url }}/${{ github.repository }}/tree/${{ github.ref_name }})
          - **提交哈希**: [${GITHUB_SHA:0:7}](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})
          - **提交信息**: ${COMMIT_MESSAGE}
          - **应用版本**: ${{ needs.extract-build-info.outputs.version }}
          ## 📝 执行状态
          | Job | 状态 |
          |-----|------|
          | Extract build info | $EXTRACT_ICON $EXTRACT_BUILD_INFO_STATUS |
          | Check snapshot tag | $CHECK_ICON $CHECK_SNAPSHOT_TAG_STATUS |
          | Push snapshot tag | $PUSH_ICON $PUSH_SNAPSHOT_TAG_STATUS |
          | Build and publish Docker image | $BUILD_ICON $BUILD_PUBLISH_STATUS |
          EOF

          if [ "$PUSH_SNAPSHOT_TAG_STATUS" == "success" ]; then
            cat >> $GITHUB_STEP_SUMMARY << EOF
          ## 🏷️ 快照标签
          - [${{ needs.extract-build-info.outputs.snapshot_tag }}](${{ github.server_url }}/${{ github.repository }}/releases/tag/${{ needs.extract-build-info.outputs.snapshot_tag }})
          EOF

          elif [ "$PUSH_SNAPSHOT_TAG_STATUS" == "skipped" ]; then
            cat >> $GITHUB_STEP_SUMMARY << EOF
          ## ℹ️ 快照标签
          - 快照标签推送已跳过
          EOF

          elif [ "$PUSH_SNAPSHOT_TAG_STATUS" == "failure" ]; then
            cat >> $GITHUB_STEP_SUMMARY << EOF
          ## ❗ 快照标签
          - 快照标签推送失败，请检查日志以获取详细信息
          EOF
          fi

          # 如果构建成功，显示镜像信息
          if [ "$BUILD_PUBLISH_STATUS" == "success" ]; then
            cat >> $GITHUB_STEP_SUMMARY << EOF
          ## 📦 Docker 镜像
          - **仓库地址**: [Docker Hub/${{ env.DOCKER_USERNAME }}/${{ env.DOCKER_REPO_NAME }}](https://hub.docker.com/repository/docker/${{ env.DOCKER_USERNAME }}/${{ env.DOCKER_REPO_NAME }})
          - **镜像标签**:
            - \`${{ env.DOCKER_USERNAME }}/${{ env.DOCKER_REPO_NAME }}:${{ needs.extract-build-info.outputs.docker_image_snapshot_tag }}\`
          EOF

          elif [ "$BUILD_PUBLISH_STATUS" == "skipped" ]; then
            cat >> $GITHUB_STEP_SUMMARY << EOF
          ## ℹ️ Docker 镜像
          - 镜像构建已跳过
          EOF

          elif [ "$BUILD_PUBLISH_STATUS" == "failure" ]; then
            cat >> $GITHUB_STEP_SUMMARY << EOF
          ## ❗ Docker 镜像
          - 镜像构建失败，请检查日志以获取详细信息
          EOF

          elif [ "$BUILD_PUBLISH_STATUS" == "cancelled" ]; then
            cat >> $GITHUB_STEP_SUMMARY << EOF
          ## ❗ Docker 镜像
          - 镜像构建被取消
          EOF
          fi

          # 时间戳
          cat >> $GITHUB_STEP_SUMMARY << EOF
          ## ⏰ 时间戳
          - **完成时间 (UTC)**: $TIMESTAMP_UTC
          - **完成时间 (Asia/Shanghai)**: $TIMESTAMP_CN
          EOF

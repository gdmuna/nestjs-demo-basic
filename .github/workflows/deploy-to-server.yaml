name: Deploy to Production Server

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      image:
        description: 'Docker image tag to deploy (e.g., myuser/myapp:v1.0.0)'
        required: true
        type: string

env:
  DOCKER_USERNAME: ${{ vars.DOCKER_USERNAME || github.repository_owner }}
  DOCKER_REPO_NAME: ${{ vars.DOCKER_REPO_NAME || github.event.repository.name }}

jobs:
  deploy:
    name: Deploy to remote server
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Determine Docker image tag
        id: image
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            IMAGE="${{ github.event.inputs.image }}"
          else
            # 从 tag 构造镜像标签 (v1.2.3 -> 1.2.3)
            VERSION=${GITHUB_REF#refs/tags/v}
            IMAGE="${{ env.DOCKER_USERNAME }}/${{ env.DOCKER_REPO_NAME }}:${VERSION}"
          fi
          echo "image=$IMAGE" >> $GITHUB_OUTPUT
          echo "📦 将部署镜像: $IMAGE"

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.DEPLOY_PORT || 22 }} ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Copy deploy script
        run: |
          scp -P ${{ secrets.DEPLOY_PORT || 22 }} \
              -i ~/.ssh/deploy_key \
              scripts/deploy-server.sh \
              ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/tmp/deploy.sh

      - name: Deploy application
        run: |
          ssh -p ${{ secrets.DEPLOY_PORT || 22 }} \
              -i ~/.ssh/deploy_key \
              ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} \
              "bash /tmp/deploy.sh '${{ steps.image.outputs.image }}' 'nestjs-app' '${{ vars.PROD_BACKEND_HOST_PORT || 3001 }}'"

      - name: Health check
        run: |
          echo "🏥 执行健康检查..."
          sleep 5

          MAX_ATTEMPTS=10
          ATTEMPT=1
          while [ $ATTEMPT -le $MAX_ATTEMPTS ]; do
            if ssh -p ${{ secrets.DEPLOY_PORT || 22 }} \
                 -i ~/.ssh/deploy_key \
                 ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} \
                 "curl -sf http://localhost:3001/health > /dev/null"; then
              echo "✅ 健康检查通过"
              break
            fi

            if [ $ATTEMPT -eq $MAX_ATTEMPTS ]; then
              echo "❌ 健康检查失败"
              exit 1
            fi

            echo "⏳ 健康检查失败，重试 ($ATTEMPT/$MAX_ATTEMPTS)..."
            sleep 3
            ATTEMPT=$((ATTEMPT + 1))
          done

      - name: Cleanup
        if: always()
        run: |
          rm -f ~/.ssh/deploy_key

      - name: Deployment summary
        if: success()
        run: |
          cat >> $GITHUB_STEP_SUMMARY << EOF
          # ✅ 生产环境部署成功
          ## 📦 部署信息
          - **镜像**: ${{ steps.image.outputs.image }}
          - **服务器**: ${{ secrets.DEPLOY_HOST }}
          - **标签**: ${{ github.ref_name }}
          - **时间**: $(date '+%Y-%m-%d %H:%M:%S')
          ## 🔗 访问方式
          - 应用地址: http://${{ secrets.DEPLOY_HOST }}:${{ vars.PROD_BACKEND_HOST_PORT || 3001 }}
          - 健康检查: http://${{ secrets.DEPLOY_HOST }}:${{ vars.PROD_BACKEND_HOST_PORT || 3001 }}/health
          EOF

name: Pull Request Check - Development

on:
  pull_request:
    branches: [dev]
    types: [opened, synchronize, reopened]

concurrency:
  group: pr-check-dev-${{ github.event.pull_request.id }}
  cancel-in-progress: true

jobs:
  lint-and-format:
    name: Lint and format
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install dependencies
        run: |
          echo "📥 安装项目依赖"
          pnpm install
          echo "✓ 依赖安装完成"

      - name: Format & Lint code
        run: |
          echo "📝 格式化代码"
          pnpm format:check
          echo "✓ 格式化完成"
          echo "✅ 质量检查"
          pnpm lint
          echo "✓ 质量检查完成"

  test:
    name: Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:18.1-alpine
        env:
          POSTGRES_USER: ci_test
          POSTGRES_PASSWORD: ci_test_password
          POSTGRES_DB: nestjs_demo_basic_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    env:
      DATABASE_URL: postgresql://ci_test:ci_test_password@localhost:5432/nestjs_demo_basic_test?schema=public
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install dependencies
        run: |
          echo "📥 安装项目依赖"
          pnpm install
          echo "✓ 依赖安装完成"

      - name: Extract version from package.json
        id: version
        run: |
          VERSION=$(node -e "console.log(require('./package.json').version)")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "📦 Application Version: $VERSION"

      - name: Generate Prisma Client
        run: pnpm prisma generate

      - name: Run tests with coverage
        run: |
          echo "🧪 运行测试"
          pnpm test --ci --coverage
          echo "✓ 测试完成"

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/

  finished:
    name: Finished
    needs: [lint-and-format, test]
    if: always()
    runs-on: ubuntu-latest
    env:
      PR_TITLE: ${{ github.event.pull_request.title }}
      PR_HEAD_REPO: ${{ github.event.pull_request.head.repo.full_name }}
      PR_HEAD_REF: ${{ github.event.pull_request.head.ref }}

    steps:
      - name: Generate summary
        run: |
          TIMESTAMP_UTC=$(date -u +"%Y-%m-%d %H:%M:%S UTC")
          TIMESTAMP_CN=$(TZ='Asia/Shanghai' date +"%Y-%m-%d %H:%M:%S %Z")

          # 转义特殊字符，防止破坏 Markdown
          PR_TITLE_ESCAPED="${PR_TITLE//$'\n'/ }"
          PR_TITLE_ESCAPED="${PR_TITLE_ESCAPED//\`/\\\`}"
          PR_HEAD_REPO_ESCAPED="${PR_HEAD_REPO//\`/\\\`}"
          PR_HEAD_REF_ESCAPED="${PR_HEAD_REF//\`/\\\`}"

          # 获取 job 状态
          LINT_FORMAT_STATUS="${{ needs.lint-and-format.result }}"
          TEST_STATUS="${{ needs.test.result }}"

          # 状态图标映射
          case "$LINT_FORMAT_STATUS" in
            success) LINT_FORMAT_ICON="✅" ;;
            failure) LINT_FORMAT_ICON="❌" ;;
            cancelled) LINT_FORMAT_ICON="🚫" ;;
            skipped) LINT_FORMAT_ICON="⏭️" ;;
            *) LINT_FORMAT_ICON="❓" ;;
          esac

          case "$TEST_STATUS" in
            success) TEST_ICON="✅" ;;
            failure) TEST_ICON="❌" ;;
            cancelled) TEST_ICON="🚫" ;;
            skipped) TEST_ICON="⏭️" ;;
            *) TEST_ICON="❓" ;;
          esac

          # 生成统一的 summary
          cat >> $GITHUB_STEP_SUMMARY << EOF
          # 🧪 PR 预检流程报告 - Development
          ## 📋 基本信息
          - **触发事件**: pull_request
          - **代码仓库**: [${{ github.repository }}](${{ github.server_url }}/${{ github.repository }})
          - **PR**: [#${{ github.event.pull_request.number }} - ${PR_TITLE_ESCAPED}](${{ github.event.pull_request.html_url }})
          - **源分支 → 目标分支**: [${PR_HEAD_REPO_ESCAPED}/${PR_HEAD_REF_ESCAPED} → ${{ github.base_ref }}](${{ github.event.pull_request.html_url }}/changes)
          - **提交哈希**: [${GITHUB_SHA:0:7}](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})
          - **应用版本**: ${{ needs.test.outputs.version }}
          ## 📝 执行状态
          | Job | 状态 |
          |-----|------|
          | Lint and format | $LINT_FORMAT_ICON $LINT_FORMAT_STATUS |
          | Test | $TEST_ICON $TEST_STATUS |
          ## ⏰ 时间戳
          - **完成时间 (UTC)**: $TIMESTAMP_UTC
          - **完成时间 (Asia/Shanghai)**: $TIMESTAMP_CN
          EOF
